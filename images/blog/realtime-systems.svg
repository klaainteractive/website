<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg-rt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5" />
      <stop offset="100%" style="stop-color:#e0e7ff" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg-rt)" />
  <!-- Network nodes -->
  <circle cx="200" cy="200" r="5" fill="#10b981" opacity="0.6" />
  <circle cx="350" cy="120" r="4" fill="#6366f1" opacity="0.5" />
  <circle cx="500" cy="280" r="5" fill="#06b6d4" opacity="0.6" />
  <circle cx="600" cy="150" r="4" fill="#10b981" opacity="0.5" />
  <circle cx="400" cy="200" r="6" fill="#6366f1" opacity="0.4" />
  <!-- Connections -->
  <line x1="200" y1="200" x2="350" y2="120" stroke="#10b981" stroke-width="1" opacity="0.2" />
  <line x1="350" y1="120" x2="400" y2="200" stroke="#6366f1" stroke-width="1" opacity="0.2" />
  <line x1="400" y1="200" x2="500" y2="280" stroke="#06b6d4" stroke-width="1" opacity="0.2" />
  <line x1="400" y1="200" x2="600" y2="150" stroke="#10b981" stroke-width="1" opacity="0.2" />
  <line x1="200" y1="200" x2="500" y2="280" stroke="#6366f1" stroke-width="0.5" opacity="0.1" />
  <!-- Pulse rings -->
  <circle cx="400" cy="200" r="30" stroke="#6366f1" stroke-width="1" opacity="0.1" />
  <circle cx="400" cy="200" r="60" stroke="#6366f1" stroke-width="0.5" opacity="0.06" />
  <circle cx="400" cy="200" r="90" stroke="#6366f1" stroke-width="0.5" opacity="0.03" />
  <!-- Radial glow -->
  <circle cx="400" cy="200" r="120" fill="#6366f1" opacity="0.04" />
</svg>
